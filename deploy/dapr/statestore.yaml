# Dapr state store Component -- Story 9.4 production CR.
# Source 2 in docs/kubernetes-deployment-architecture.md. Story 9.5 applies this
# file before Configurations and Subscriptions. Redis no-AUTH is inherited from
# Story 9.3's MVP Redis carve-out, so no Redis AUTH or Secret metadata is present.
apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: statestore
  namespace: hexalith-parties
spec:
  type: state.redis
  version: v1
  metadata:
    - name: redisHost
      value: redis:6379
    - name: actorStateStore
      value: "true"
    - name: keyPrefix
      value: "none"
scopes:
  - eventstore
  - eventstore-admin
  - parties
  - tenants
  - memories
