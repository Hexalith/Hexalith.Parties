# Reference-only Dapr declarative subscription for the sample party-events consumer.
# The sample app is not one of the 9 MVP Kubernetes workloads, so this manifest is
# scoped to app-id "sample" and should not block the production topology when no
# sample sidecar exists. Story 9.5 applies the CR set; runtime sample enablement is
# separate from the production workload count.
apiVersion: dapr.io/v2alpha1
kind: Subscription
metadata:
  name: parties-events-reference
  namespace: hexalith-parties
spec:
  pubsubname: pubsub
  topic: tenant-a.parties.events
  routes:
    default: /events/parties
  deadLetterTopic: deadletter.tenant-a.parties.events
scopes:
  - sample
