# Dapr access-control Configuration for the Tenants receiving sidecar.
# EventStore may process tenant domain commands through the exact domain-service
# route. Parties may only probe readiness while Tenants integration is enabled.
apiVersion: dapr.io/v1alpha1
kind: Configuration
metadata:
  name: accesscontrol-tenants
  namespace: hexalith-parties
spec:
  accessControl:
    defaultAction: deny
    trustDomain: hexalith.io
    policies:
      - appId: eventstore
        defaultAction: deny
        trustDomain: hexalith.io
        namespace: hexalith-parties
        operations:
          - name: /process
            httpVerb: ['POST']
            action: allow
      - appId: parties
        defaultAction: deny
        trustDomain: hexalith.io
        namespace: hexalith-parties
        operations:
          - name: /ready
            httpVerb: ['GET']
            action: allow
