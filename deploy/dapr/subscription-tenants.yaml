# Dapr declarative subscription for tenant lifecycle events delivered to Parties.
# Matches src/Hexalith.Parties/Program.cs and TenantEventInfrastructureTests:
# pubsub "pubsub", topic "system.tenants.events", route POST /tenants/events.
apiVersion: dapr.io/v2alpha1
kind: Subscription
metadata:
  name: tenant-lifecycle-events
  namespace: hexalith-parties
spec:
  pubsubname: pubsub
  topic: system.tenants.events
  routes:
    default: /tenants/events
  deadLetterTopic: deadletter.system.tenants.events
scopes:
  - parties
