# DAPR Pub/Sub Component -- Production Kafka
# ===============================================================
# Kafka-backed pub/sub for party event distribution.
# Topic pattern: {tenant}.parties.events
# Dead-letter topic pattern: deadletter.{tenant}.parties.events
#
# SCOPING ARCHITECTURE (Three Layers)
# ====================================
#
# Layer 1 -- Component Scoping (scopes field):
#   Controls which app-ids can USE this pub/sub component at all.
#   Only commandapi and authorized subscriber app-ids are listed.
#
# Layer 2 -- Publishing Scoping (publishingScopes metadata):
#   Controls which app-ids can PUBLISH to which topics.
#   Apps NOT listed in publishingScopes have unrestricted publish access.
#   NOTE: DAPR does NOT support wildcards (*) in scoping -- strict string match only.
#
# Layer 3 -- Subscription Scoping (subscriptionScopes metadata):
#   Controls which app-ids can SUBSCRIBE to which topics.
#   Apps NOT listed in subscriptionScopes have unrestricted subscribe access.
#   NOTE: DAPR does NOT support wildcards (*) in scoping -- strict string match only.
#
# PUBLISHER-SIDE SCOPING:
#   commandapi is NOT listed in publishingScopes = can publish to ANY topic.
#
# SUBSCRIBER-SIDE SCOPING:
#   commandapi is explicitly listed for system.tenants.events so Parties can
#   consume Hexalith.Tenants authority state even when production scoping is on.
#   External subscribers must be explicitly scoped to authorized tenant topics.
#
# ADDING A NEW SUBSCRIBER SERVICE (Production)
# ==============================================
# Step 1: Add the subscriber app-id to the 'scopes' list below.
# Step 2: Add the subscriber to 'subscriptionScopes' with authorized tenant topics.
#         Format: ";{env:NEW_SUBSCRIBER_APP_ID}={tenant}.parties.events"
# Step 3: Do NOT add the subscriber to 'publishingScopes'.
# Step 4: Dead-letter access is SEPARATE. Only add dead-letter topics for ops tools.
#
# ORDERING GUARANTEES (FR73):
#   Kafka provides causal ordering per partition. Use aggregate-ID-based key routing
#   to ensure all events for the same aggregate are processed in order.
#   This shared template only captures scoping and dead-letter defaults.
#   Add the partition-routing metadata required by your DAPR Kafka component
#   when rendering environment-specific deployment manifests.
#
# DYNAMIC TENANT PROVISIONING:
#   Publisher (commandapi): NOT listed in scoping = unrestricted.
#   Subscriber: MUST be explicitly granted access per tenant topic.
apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: pubsub
spec:
  type: pubsub.kafka
  version: v1
  metadata:
    - name: brokers
      # Comma-separated Kafka broker addresses. Format: broker1:9092,broker2:9092
      # Provide via environment variable -- NEVER hardcode in this file.
      value: "{env:KAFKA_BROKERS}"
    - name: authType
      # Kafka authentication type: none, password, mtls, or oidc.
      value: "{env:KAFKA_AUTH_TYPE}"
    - name: enableDeadLetter
      value: "true"
    - name: deadLetterTopic
      value: "deadletter"
    # Publishing scoping:
    # commandapi is NOT listed = unrestricted publishing to all topics.
    # Subscribers are denied publishing.
    - name: publishingScopes
      value: "{env:SUBSCRIBER_APP_ID}=;{env:OPS_MONITOR_APP_ID}="
    # Subscription scoping:
    # commandapi is NOT listed = unrestricted subscription to all topics.
    # MUST CUSTOMIZE: Replace example topic names with actual tenant.parties.events topics.
    - name: subscriptionScopes
      value: "commandapi=system.tenants.events;{env:SUBSCRIBER_APP_ID}=acme.parties.events;{env:OPS_MONITOR_APP_ID}=deadletter.acme.parties.events"
scopes:
  - commandapi
  - "{env:SUBSCRIBER_APP_ID}"
  - "{env:OPS_MONITOR_APP_ID}"
