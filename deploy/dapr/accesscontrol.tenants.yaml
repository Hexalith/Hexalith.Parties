# DAPR Access Control Configuration -- Production Tenants Authority
# ==================================================================
# Receiving-sidecar policy for Tenants. EventStore-Tenants communication
# uses the shared pub/sub component (system.tenants.events topic), not
# DAPR service-invocation; therefore eventstore has no policy entry here.
# The Parties actor host is the only DAPR service-invocation caller and is
# limited to the accepted readiness probe path.
apiVersion: dapr.io/v1alpha1
kind: Configuration
metadata:
  name: accesscontrol-tenants
spec:
  accessControl:
    defaultAction: deny
    trustDomain: hexalith.io
    policies:
      - appId: parties
        defaultAction: deny
        trustDomain: hexalith.io
        namespace: hexalith-parties
        operations:
          - name: /ready
            httpVerb: ['GET']
            action: allow
