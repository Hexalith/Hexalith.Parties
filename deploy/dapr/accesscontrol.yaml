# DAPR Access Control Configuration -- Production
# ==================================================================
# Defines service-to-service invocation policies for the EventStore gateway sidecar.
# Each DAPR sidecar loads its own Configuration to evaluate INCOMING invocation requests.
#
# Security Posture: defaultAction: deny (secure by default)
# Trust Domain: Configure for production environment via DAPR_TRUST_DOMAIN env var
# Namespace: Configure for production Kubernetes namespace via DAPR_NAMESPACE env var
#
# Required EventStore callers:
#   eventstore-admin: operator inspection calls
#   tenants: tenant lifecycle commands
#   parties: projection/reactor commands routed through the EventStore gateway
apiVersion: dapr.io/v1alpha1
kind: Configuration
metadata:
  name: accesscontrol
spec:
  accessControl:
    defaultAction: deny
    trustDomain: hexalith.io
    policies:
      - appId: eventstore-admin
        defaultAction: deny
        trustDomain: hexalith.io
        namespace: hexalith-parties
        operations:
          - name: /**
            httpVerb: ['GET', 'POST', 'PUT']
            action: allow
      - appId: tenants
        defaultAction: deny
        trustDomain: hexalith.io
        namespace: hexalith-parties
        operations:
          - name: /**
            httpVerb: ['POST']
            action: allow
      - appId: parties
        defaultAction: deny
        trustDomain: hexalith.io
        namespace: hexalith-parties
        operations:
          - name: /**
            httpVerb: ['POST']
            action: allow
