# Dapr Resiliency CR -- Story 9.4 production topology.
# Story 9.5 must run:
#   kubectl apply -f deploy/dapr/resiliency.yaml --dry-run=server
# before applying consumers, and fail publish with exit code 1 on a dry-run error
# while naming the offending CR without printing the full CR body.
apiVersion: dapr.io/v1alpha1
kind: Resiliency
metadata:
  name: resiliency
  namespace: hexalith-parties
spec:
  policies:
    retries:
      defaultRetry:
        policy: constant
        duration: 1s
        maxRetries: 3
      pubsubRetryOutbound:
        policy: exponential
        maxInterval: 10s
        maxRetries: 3
      pubsubRetryInbound:
        policy: exponential
        maxInterval: 30s
        maxRetries: 10
    timeouts:
      daprSidecar: 5s
      pubsubTimeout: 10s
      subscriberTimeout: 30s
    circuitBreakers:
      defaultBreaker:
        maxRequests: 1
        interval: 10s
        timeout: 30s
        trip: consecutiveFailures > 3
      pubsubBreaker:
        maxRequests: 1
        interval: 10s
        timeout: 30s
        trip: consecutiveFailures > 5
  targets:
    apps:
      eventstore:
        retry: defaultRetry
        timeout: daprSidecar
        circuitBreaker: defaultBreaker
      # eventstore-admin intentionally omitted: accesscontrol-eventstore-admin
      # denies all peer invocation by design.
      parties:
        retry: defaultRetry
        timeout: daprSidecar
        circuitBreaker: defaultBreaker
      tenants:
        retry: defaultRetry
        timeout: daprSidecar
        circuitBreaker: defaultBreaker
      memories:
        retry: defaultRetry
        timeout: daprSidecar
        circuitBreaker: defaultBreaker
    components:
      pubsub:
        outbound:
          retry: pubsubRetryOutbound
          timeout: pubsubTimeout
          circuitBreaker: pubsubBreaker
        inbound:
          retry: pubsubRetryInbound
          timeout: subscriberTimeout
          circuitBreaker: pubsubBreaker
      statestore:
        outbound:
          retry: defaultRetry
          timeout: daprSidecar
          circuitBreaker: defaultBreaker
