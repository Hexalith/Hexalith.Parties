# DAPR Resiliency Configuration -- Production
# ================================================================
# Retry, timeout, and circuit breaker policies for the Parties topology.
# These policies AUGMENT built-in pub/sub component retries.
# Effective retry count = component built-in retries x resiliency retries.
#
# Per-backend effective retry counts:
#   Redis Streams: 0 built-in -> effective = 5 (resiliency only)
#   RabbitMQ: ~3 built-in (publisher confirms) -> effective ~15 (3 x 5)
#   Kafka: ~infinite built-in (default retries=2147483647) -> resiliency rarely fires
#   Azure Service Bus: 3 built-in (SDK default) -> effective ~15 (3 x 5)
#
# Story 9.3 AC6 — rewritten against Dapr 1.14.4 `resiliencies.dapr.io` CRD. Two field-shape
# fixes vs the legacy form:
#   1. `spec.policies.timeouts` is a flat `name: Duration` map. The legacy nested form
#      `timeouts.daprSidecar.general: 5s` is rejected as `unknown field` — flattened to
#      `daprSidecar: 5s`.
#   2. `spec.targets.components.<name>.{retry,timeout,circuitBreaker}` must be split into
#      `outbound`/`inbound` sub-blocks for component targets that have both directions
#      (statestore = read/write, pubsub = publish/subscribe). The legacy flat shape on
#      `components.statestore` was rejected; both pubsub and statestore now carry the split.
#
# `deploy/k8s/deploy-local.ps1` runs `kubectl apply --dry-run=server -f` against this file
# immediately after `dapr init -k` so any future Dapr CRD upgrade that drops or renames a
# field surfaces here (exit 1) before any namespaced resource is applied.
apiVersion: dapr.io/v1alpha1
kind: Resiliency
metadata:
  name: resiliency
spec:
  policies:
    retries:
      defaultRetry:
        policy: exponential
        maxInterval: 15s
        maxRetries: 10
      # Pub/sub outbound: publisher -> sidecar -> broker
      # Conservative: persist-then-publish with drain recovery handles prolonged outages
      pubsubRetryOutbound:
        policy: exponential
        maxInterval: 10s
        maxRetries: 5
      # Pub/sub inbound: broker -> sidecar -> subscriber app
      pubsubRetryInbound:
        policy: exponential
        maxInterval: 60s
        maxRetries: 20
    # Story 9.3 AC6 — `timeouts` is a flat `name: Duration` map per Dapr 1.14.4 CRD; the legacy
    # nested `daprSidecar.general` form was rejected as `unknown field`.
    timeouts:
      daprSidecar: 5s
      pubsubTimeout: 10s
      subscriberTimeout: 30s
    circuitBreakers:
      defaultBreaker:
        maxRequests: 1
        interval: 60s
        timeout: 60s
        trip: consecutiveFailures > 5
      # Pub/sub circuit breaker: when open, AggregateActor receives immediate failure
      # and transitions to PublishFailed state for drain recovery
      pubsubBreaker:
        maxRequests: 1
        interval: 60s
        timeout: 60s
        trip: consecutiveFailures > 10
  targets:
    apps:
      parties:
        retry: defaultRetry
        timeout: daprSidecar
        circuitBreaker: defaultBreaker
    components:
      # Story 9.3 AC6 — components with both directions (pubsub publish/subscribe,
      # statestore read/write) MUST split into `outbound`/`inbound` sub-blocks per the Dapr
      # 1.14.4 CRD. The legacy flat shape on `statestore` was rejected as `unknown field`.
      pubsub:
        outbound:
          retry: pubsubRetryOutbound
          timeout: pubsubTimeout
          circuitBreaker: pubsubBreaker
        inbound:
          retry: pubsubRetryInbound
          timeout: subscriberTimeout
      statestore:
        outbound:
          retry: defaultRetry
          timeout: daprSidecar
          circuitBreaker: defaultBreaker
        inbound:
          retry: defaultRetry
          timeout: daprSidecar
