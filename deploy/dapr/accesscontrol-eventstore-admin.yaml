# Dapr access-control Configuration for the EventStore Admin Server receiving sidecar.
# Admin UI invokes the Admin Server through Dapr service invocation. It forwards
# the user JWT and Admin Server remains responsible for RBAC and tenant checks.
apiVersion: dapr.io/v1alpha1
kind: Configuration
metadata:
  name: accesscontrol-eventstore-admin
  namespace: hexalith-parties
spec:
  accessControl:
    defaultAction: deny
    trustDomain: hexalith.io
    policies:
      - appId: eventstore-admin-ui
        defaultAction: deny
        trustDomain: hexalith.io
        namespace: hexalith-parties
        operations:
          - name: /api/v1/admin/**
            httpVerb: ['GET', 'POST', 'PUT', 'DELETE']
            action: allow
          - name: /health
            httpVerb: ['GET']
            action: allow
          - name: /ready
            httpVerb: ['GET']
            action: allow
