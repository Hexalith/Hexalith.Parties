# Hexalith.Parties EventStore-Fronted Deployment Topology
# ======================================================
# Deployment validation reads this manifest to keep gateway, actor-host,
# Tenants authority, admin resources, and optional MCP status distinct.
apiVersion: hexalith.io/v1
kind: PartiesTopology
metadata:
  name: parties-eventstore-fronted
spec:
  appIds:
    - eventstore
    - eventstore-admin
    - eventstore-admin-ui
    - parties
    - tenants
    - parties-mcp
  mcpEnabled: false
  eventStoreAdminUi:
    adminServerAppId: eventstore-admin
  domainServices:
    - key: "*|party|v1"
      appId: parties
      methodName: process
      domain: party
  deploymentSecurity:
    authentication:
      jwtIssuer: "{env:AUTHENTICATION_JWTBEARER_ISSUER}"
      jwtAudience: "{env:AUTHENTICATION_JWTBEARER_AUDIENCE}"
      signingKeySecretName: hexalith-jwt-signing
      signingKeySecretKey: Authentication__JwtBearer__SigningKey
      failClosed: true
    transport:
      httpsRequired: true
      daprMtlsRequired: true
      localDevelopmentHttpAllowed: false
