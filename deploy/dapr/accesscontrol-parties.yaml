# Dapr access-control Configuration for the Parties receiving sidecar.
# Service invocation is deny-by-default; only EventStore may submit domain
# processing requests to POST /process. Tenant lifecycle delivery is pub/sub
# delivery to POST /tenants/events and is not a service-invocation ACL entry.
apiVersion: dapr.io/v1alpha1
kind: Configuration
metadata:
  name: accesscontrol-parties
  namespace: hexalith-parties
spec:
  accessControl:
    defaultAction: deny
    trustDomain: hexalith.io
    policies:
      - appId: eventstore
        defaultAction: deny
        trustDomain: hexalith.io
        namespace: hexalith-parties
        operations:
          - name: /process
            httpVerb: ['POST']
            action: allow
