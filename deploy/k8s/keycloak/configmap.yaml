---
apiVersion: v1
kind: ConfigMap
metadata:
  name: keycloak-realm
data:
  hexalith-realm.json: |
    {
      "realm": "hexalith",
      "enabled": true,
      "sslRequired": "none",
      "registrationAllowed": false,
      "loginWithEmailAllowed": false,
      "duplicateEmailsAllowed": false,
      "resetPasswordAllowed": false,
      "editUsernameAllowed": false,
      "bruteForceProtected": false,
      "accessTokenLifespan": 3600,
      "clients": [
        {
          "clientId": "hexalith-eventstore",
          "name": "Hexalith EventStore",
          "description": "EventStore API and admin UI client for local development and Kubernetes MVP deployment",
          "enabled": true,
          "publicClient": true,
          "directAccessGrantsEnabled": true,
          "standardFlowEnabled": true,
          "serviceAccountsEnabled": false,
          "fullScopeAllowed": true,
          "protocolMappers": [
            {
              "name": "audience-mapper",
              "protocol": "openid-connect",
              "protocolMapper": "oidc-audience-mapper",
              "consentRequired": false,
              "config": {
                "included.client.audience": "hexalith-eventstore",
                "id.token.claim": "false",
                "access.token.claim": "true"
              }
            },
            {
              "name": "tenants-mapper",
              "protocol": "openid-connect",
              "protocolMapper": "oidc-usermodel-attribute-mapper",
              "consentRequired": false,
              "config": {
                "user.attribute": "tenants",
                "claim.name": "eventstore:tenant",
                "jsonType.label": "String",
                "multivalued": "true",
                "id.token.claim": "true",
                "access.token.claim": "true",
                "userinfo.token.claim": "true",
                "aggregate.attrs": "true"
              }
            },
            {
              "name": "domains-mapper",
              "protocol": "openid-connect",
              "protocolMapper": "oidc-usermodel-attribute-mapper",
              "consentRequired": false,
              "config": {
                "user.attribute": "domains",
                "claim.name": "eventstore:domain",
                "jsonType.label": "String",
                "multivalued": "true",
                "id.token.claim": "true",
                "access.token.claim": "true",
                "userinfo.token.claim": "true",
                "aggregate.attrs": "true"
              }
            },
            {
              "name": "permissions-mapper",
              "protocol": "openid-connect",
              "protocolMapper": "oidc-usermodel-attribute-mapper",
              "consentRequired": false,
              "config": {
                "user.attribute": "permissions",
