---
# Story 9.3 AC4 — Keycloak in-cluster service. Reachable from consumer Deployments at
# `http://keycloak:8080/realms/hexalith`. The OIDC Authority/Issuer env vars on the
# consumer Deployments use this DNS name.
apiVersion: v1
kind: Service
metadata:
  name: keycloak
  labels:
    app: keycloak
spec:
  selector:
    app: keycloak
  ports:
  - name: http
    port: 8080
    targetPort: 8080
