# OIDC issuer URL for in-cluster publish mode:
# http://keycloak.hexalith-parties.svc.cluster.local:8080/realms/hexalith
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
  labels:
    app: keycloak
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keycloak
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: keycloak
    spec:
      automountServiceAccountToken: false
      containers:
      - name: keycloak
        image: quay.io/keycloak/keycloak:26.6.2
        imagePullPolicy: IfNotPresent
        readinessProbe:
          httpGet:
            path: /realms/hexalith
            port: http
          periodSeconds: 10
          failureThreshold: 12
        livenessProbe:
          httpGet:
            path: /realms/hexalith
            port: http
          initialDelaySeconds: 120
          periodSeconds: 20
          failureThreshold: 6
        startupProbe:
          httpGet:
            path: /realms/hexalith
            port: http
          periodSeconds: 10
          failureThreshold: 30
        args:
        - start-dev
        - --import-realm
        env:
        # Bootstrap credentials are created by deploy/k8s/publish.ps1, never echoed,
        # never committed, and rotated by deleting Secret hexalith-keycloak-admin
        # before re-running publish.ps1. Until Story 9.5 lands, operators may
        # precreate the Secret imperatively; this repository must not contain it.
        - name: KC_BOOTSTRAP_ADMIN_USERNAME
          valueFrom:
            secretKeyRef:
              name: hexalith-keycloak-admin
              key: KC_BOOTSTRAP_ADMIN_USERNAME
        - name: KC_BOOTSTRAP_ADMIN_PASSWORD
          valueFrom:
            secretKeyRef:
              name: hexalith-keycloak-admin
              key: KC_BOOTSTRAP_ADMIN_PASSWORD
        ports:
        - name: http
          containerPort: 8080
        volumeMounts:
        - name: keycloak-realm
          mountPath: /opt/keycloak/data/import/hexalith-realm.json
          subPath: hexalith-realm.json
      volumes:
      - name: keycloak-realm
        configMap:
          name: keycloak-realm
