resources:
- deployment.yaml
- service.yaml

generatorOptions:
  disableNameSuffixHash: true

configMapGenerator:
- name: sample-blazor-ui-env
  literals:
    - OTEL_DOTNET_EXPERIMENTAL_OTLP_RETRY=in_memory
    - ASPNETCORE_FORWARDEDHEADERS_ENABLED=true
    - HTTP_PORTS=8080
    - EVENTSTORE_HTTP=http://eventstore:8080
    - services__eventstore__http__0=http://eventstore:8080
    - SAMPLE_HTTP=http://sample:8080
    - services__sample__http__0=http://sample:8080
    - EventStore__EventStoreUrl=http://eventstore:8080
    - EventStore__SignalR__HubUrl=http://eventstore:8080/hubs/projection-changes
    - EventStore__Authentication__Authority=https://auth.tache.ai/realms/tache
    - EventStore__Authentication__ClientId=hexalith-eventstore
    - EventStore__Authentication__ClientCredentialsClientId=hexalith-eventstore-ui
    - EventStore__Authentication__Subject=sample-blazor-ui
    - EventStore__Authentication__Issuer=https://auth.tache.ai/realms/tache
    - EventStore__Authentication__Audience=hexalith-eventstore
    - EventStore__Authentication__Tenants__0=tenant-a
    - EventStore__Authentication__Domains__0=counter
    - EventStore__Authentication__Permissions__0=command:submit
    - EventStore__Authentication__Permissions__1=query:read
    - ASPNETCORE_URLS=http://+:8080;
