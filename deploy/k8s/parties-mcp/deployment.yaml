---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: parties-mcp
  labels:
    app: parties-mcp
spec:
  minReadySeconds: 60
  replicas: 1
  selector:
    matchLabels:
      app: parties-mcp
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: parties-mcp
    spec:
      imagePullSecrets:
      - name: zot-pull-secret
      containers:
      - name: parties-mcp
        image: registry.hexalith.com/parties-mcp:0.0.0-preview.0.500
        imagePullPolicy: IfNotPresent
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 10
          timeoutSeconds: 10
          periodSeconds: 10
          failureThreshold: 30
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 120
          timeoutSeconds: 10
          periodSeconds: 10
          failureThreshold: 30
        ports:
        - name: http
          containerPort: 8080
        - name: https
          containerPort: 8443
        envFrom:
        - configMapRef:
            name: parties-mcp-env
      terminationGracePeriodSeconds: 180