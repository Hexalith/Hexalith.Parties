---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  labels:
    app: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: redis
    spec:
      automountServiceAccountToken: false
      containers:
      - name: redis
        image: redis:8.6.3
        imagePullPolicy: IfNotPresent
        readinessProbe:
          tcpSocket:
            port: redis
        livenessProbe:
          tcpSocket:
            port: redis
        ports:
        - name: redis
          containerPort: 6379
        volumeMounts:
        - name: redis-data
          mountPath: /data
      volumes:
      # MVP boundary:
      # - emptyDir keeps the deployment simple for local-cluster validation.
      # - Data is lost whenever the Pod is recreated or rescheduled.
      # - Redis AUTH, network policy, replication, and persistent storage are intentionally absent.
      # - Production hardening is deferred to docs/kubernetes-deployment-architecture.md section 12.
      # - Story 9.4 Dapr Components must target redis:6379 without a credential field.
      - name: redis-data
        emptyDir: {}
