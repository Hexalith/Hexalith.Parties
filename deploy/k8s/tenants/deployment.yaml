---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tenants
  labels:
    app: tenants
  annotations:
    dapr.io/enabled: 'true'
    dapr.io/config: tracing
    dapr.io/app-id: tenants
    dapr.io/app-port: '8080'
    dapr.io/enable-api-logging: 'true'
spec:
  minReadySeconds: 60
  replicas: 1
  selector:
    matchLabels:
      app: tenants
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: tenants
      annotations:
        dapr.io/enabled: 'true'
        dapr.io/config: tracing
        dapr.io/app-id: tenants
        dapr.io/app-port: '8080'
        dapr.io/enable-api-logging: 'true'
    spec:
      containers:
      - name: tenants
        image: registry.hexalith.com/tenants:0.1.1-preview.0.3
        imagePullPolicy: IfNotPresent
        readinessProbe:
          httpGet:
            path: /health
            port: http
        livenessProbe:
          httpGet:
            path: /health
            port: http
        ports:
        - name: http
          containerPort: 8080
        - name: https
          containerPort: 8443
        envFrom:
        - configMapRef:
            name: tenants-env
      imagePullSecrets:
      - name: zot-pull-secret
      terminationGracePeriodSeconds: 180
