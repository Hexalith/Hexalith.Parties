resources:
- deployment.yaml
- service.yaml

generatorOptions:
  disableNameSuffixHash: true

configMapGenerator:
- name: parties-env
  literals:
    - OTEL_DOTNET_EXPERIMENTAL_OTLP_RETRY=in_memory
    - ASPNETCORE_FORWARDEDHEADERS_ENABLED=true
    - HTTP_PORTS=8080
    - EVENTSTORE_HTTP=http://eventstore:8080
    - services__eventstore__http__0=http://eventstore:8080
    - TENANTS_HTTP=http://tenants:8080
    - services__tenants__http__0=http://tenants:8080
    - Tenants__Enabled=true
    - Tenants__ServiceName=tenants
    - Tenants__CommandApiAppId=eventstore
    - Tenants__PubSubName=pubsub
    - Tenants__TopicName=system.tenants.events
    - MEMORIES_HTTP=http://memories:8080
    - services__memories__http__0=http://memories:8080
    - Parties__MemoriesSearch__Enabled=true
    - Parties__MemoriesSearch__Endpoint=http://memories:8080/
    - Parties__MemoriesSearch__RequireApiToken=false
    - Parties__MemoriesSearch__TenantId=hexalith-dev
    - Parties__MemoriesSearch__CaseId=parties
    - ASPNETCORE_ENVIRONMENT=Development
    - DOTNET_ENVIRONMENT=Development
    - Authentication__JwtBearer__Issuer=hexalith-dev
    - Authentication__JwtBearer__Audience=hexalith-parties
    - Authentication__JwtBearer__TokenValidationParameters__ValidAudiences__0=hexalith-parties
    - Authentication__JwtBearer__TokenValidationParameters__ValidAudiences__1=hexalith-eventstore
    - Authentication__JwtBearer__RequireHttpsMetadata=false
    - ASPNETCORE_URLS=http://+:8080;
