resources:
- deployment.yaml
- service.yaml

generatorOptions:
  disableNameSuffixHash: true

configMapGenerator:
- name: eventstore-env
  literals:
    - OTEL_DOTNET_EXPERIMENTAL_OTLP_RETRY=in_memory
    - ASPNETCORE_FORWARDEDHEADERS_ENABLED=true
    - HTTP_PORTS=8080
    - Authentication__DaprInternal__AllowedCallers__0=tenants
    - EventStore__DomainServices__Registrations__wildcard_party_v1__AppId=parties
    - EventStore__DomainServices__Registrations__wildcard_party_v1__MethodName=process
    - EventStore__DomainServices__Registrations__wildcard_party_v1__TenantId=*
    - EventStore__DomainServices__Registrations__wildcard_party_v1__Domain=party
    - EventStore__DomainServices__Registrations__wildcard_party_v1__Version=v1
    - EventStore__SignalR__Enabled=true
    - ASPNETCORE_ENVIRONMENT=Development
    - DOTNET_ENVIRONMENT=Development
    - Authentication__JwtBearer__Authority=http://auth.tache.ai:8080/realms/tache
    - Authentication__JwtBearer__Issuer=http://auth.tache.ai:8080/realms/tache
    - Authentication__JwtBearer__Audience=hexalith-eventstore
    - Authentication__JwtBearer__RequireHttpsMetadata=false
    - ASPNETCORE_URLS=http://+:8080;
