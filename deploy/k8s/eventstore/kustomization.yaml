resources:
- deployment.yaml
- service.yaml
- appconfig-cm.yaml

generatorOptions:
  disableNameSuffixHash: true

configMapGenerator:
- name: eventstore-env
  literals:
    - OTEL_DOTNET_EXPERIMENTAL_OTLP_RETRY=in_memory
    - ASPNETCORE_FORWARDEDHEADERS_ENABLED=true
    - HTTP_PORTS=8080
    - Authentication__DaprInternal__AllowedCallers__0=tenants
    - ASPNETCORE_ENVIRONMENT=Production
    - ASPNETCORE_URLS=http://+:8080;
