# Workaround for K8s rejecting env var keys with '*' and '|' chars
# (e.g. EventStore__DomainServices__Registrations__*|party|v1__*).
# These come from AddProject(...).WithEnvironment(...) in
# src/Hexalith.Parties.AppHost/Program.cs and are valid Linux env vars
# under `dotnet aspire run`, but K8s rejects them as ConfigMap data keys
# AND as Pod env names.
# Workaround: mount values as appsettings.Production.json so .NET IConfiguration
# loads them via JSON (no key-char restrictions).
# Proper fix is to change the AppHost composition to use array-indexed
# registration keys (Registrations__0__Key, Registrations__0__AppId, ...).
apiVersion: v1
kind: ConfigMap
metadata:
  name: eventstore-domain-config
data:
  appsettings.Production.json: |
    {
      "EventStore": {
        "DomainServices": {
          "Registrations": {
            "*|party|v1": {
              "AppId": "parties",
              "MethodName": "process",
              "TenantId": "*",
              "Domain": "party",
              "Version": "v1"
            }
          }
        }
      }
    }
