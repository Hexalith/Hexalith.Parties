# Story 9.3 AC1 — Sanitized registration shape (no '*' or '|' literals).
# Background: PR #39 / merge 8bae56b2 added this file as a manual workaround because
# K8s ConfigMap data keys reject '*' / '|' chars (the legacy AppHost env shape
# `EventStore__DomainServices__Registrations__*|party|v1__*` was K8s-invalid). Story 9.3
# closed the spec by rewriting the AppHost to emit the sanitized form
# `Registrations__wildcard_party_v1__*` (Program.cs lines 13-19) and extending the
# EventStore DomainServiceResolver to recognize the new key shape (parallel PR per
# Hexalith.EventStore/CLAUDE.md). The appsettings.Production.json mount below uses
# the same sanitized form; after the next `pwsh deploy/k8s/regen.ps1` run, aspirate
# emits the registration as env vars on `eventstore-env` directly and this file
# becomes redundant (removable in a follow-up commit).
apiVersion: v1
kind: ConfigMap
metadata:
  name: eventstore-domain-config
data:
  appsettings.Production.json: |
    {
      "EventStore": {
        "DomainServices": {
          "Registrations": {
            "wildcard_party_v1": {
              "AppId": "parties",
              "MethodName": "process",
              "TenantId": "*",
              "Domain": "party",
              "Version": "v1"
            }
          }
        }
      }
    }
