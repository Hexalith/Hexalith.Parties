resources:
- deployment.yaml
- service.yaml

generatorOptions:
  disableNameSuffixHash: true

configMapGenerator:
- name: eventstore-admin-env
  literals:
    - OTEL_DOTNET_EXPERIMENTAL_OTLP_RETRY=in_memory
    - ASPNETCORE_FORWARDEDHEADERS_ENABLED=true
    - HTTP_PORTS=8080
    - EVENTSTORE_HTTP=http://eventstore:8080
    - services__eventstore__http__0=http://eventstore:8080
    - Authentication__JwtBearer__Authority=http://keycloak.hexalith-parties.svc.cluster.local:8080/realms/hexalith
    - Authentication__JwtBearer__Issuer=http://keycloak.hexalith-parties.svc.cluster.local:8080/realms/hexalith
    - Authentication__JwtBearer__Audience=hexalith-eventstore
    - Authentication__JwtBearer__RequireHttpsMetadata=false
    - ASPNETCORE_URLS=http://+:8080;

