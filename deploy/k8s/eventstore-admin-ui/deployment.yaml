---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: eventstore-admin-ui
  labels:
    app: eventstore-admin-ui
spec:
  minReadySeconds: 60
  replicas: 1
  selector:
    matchLabels:
      app: eventstore-admin-ui
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: eventstore-admin-ui
    spec:
      imagePullSecrets:
      - name: zot-pull-secret
      containers:
      - name: eventstore-admin-ui
        image: registry.hexalith.com/eventstore-admin-ui:staging-latest
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 8080
        - name: https
          containerPort: 8443
        envFrom:
        - configMapRef:
            name: eventstore-admin-ui-env
      terminationGracePeriodSeconds: 180