resources:
- deployment.yaml
- service.yaml

generatorOptions:
  disableNameSuffixHash: true

configMapGenerator:
- name: eventstore-admin-ui-env
  literals:
    - OTEL_DOTNET_EXPERIMENTAL_OTLP_RETRY=in_memory
    - ASPNETCORE_FORWARDEDHEADERS_ENABLED=true
    - HTTP_PORTS=8080
    - EVENTSTORE_ADMIN_HTTP=http://eventstore-admin:8080
    - services__eventstore-admin__http__0=http://eventstore-admin:8080
    - EventStore__AdminServer__SwaggerUrl=/swagger/index.html
    - ASPNETCORE_URLS=http://+:8080;

