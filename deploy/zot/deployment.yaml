apiVersion: apps/v1
kind: Deployment
metadata:
  name: zot
  namespace: zot
  labels:
    app: zot
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: zot
  template:
    metadata:
      labels:
        app: zot
    spec:
      containers:
        - name: zot
          # Pinned per the digest-resolve rule (Story 9.1 Subtask 2.3).
          # Live cluster :latest digest sha256:2f4da11ec2ed0fccf8e93186bf9bdd7b7115a649a0b954c1a09f776d5199174d
          # matches ghcr.io/project-zot/zot-linux-amd64:v2.1.17 (verified 2026-05-21 via `docker manifest inspect --verbose`).
          image: ghcr.io/project-zot/zot-linux-amd64:v2.1.17
          imagePullPolicy: IfNotPresent
          ports:
            - name: zot-http
              containerPort: 5000
              protocol: TCP
          readinessProbe:
            tcpSocket:
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            successThreshold: 1
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            successThreshold: 1
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 2Gi
          volumeMounts:
            - name: config-volume
              mountPath: /etc/zot/config.json
              subPath: config.json
            - name: auth-volume
              # Mounts Secret/zot-auth-secret as a directory. The Secret MUST carry a
              # data-key named exactly `htpasswd` so the file lands at
              # /etc/zot/auth/htpasswd (matches configmap.yaml http.auth.htpasswd.path).
              # See deploy/zot/README.md "Out-of-band Secret creation" for the
              # `kubectl create secret generic ... --from-file=htpasswd=...` invocation.
              mountPath: /etc/zot/auth
            - name: storage-volume
              mountPath: /var/lib/registry
      volumes:
        - name: config-volume
          configMap:
            name: zot-config
        - name: auth-volume
          secret:
            secretName: zot-auth-secret
        - name: storage-volume
          persistentVolumeClaim:
            claimName: zot-pvc
