apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: zot-pvc
  namespace: zot
  labels:
    app: zot
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local
  resources:
    requests:
      # Pinned to the live-cluster value (Story 9.1 Subtask 2.4).
      # PVCs only grow: kubectl apply leaves a larger live PVC untouched (cosmetic drift) but fails if smaller.
      storage: 20Gi
