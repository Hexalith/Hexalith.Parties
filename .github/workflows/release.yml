name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    uses: Hexalith/Hexalith.Builds/.github/workflows/domain-release.yml@main
    with:
      solution: Hexalith.Parties.slnx
      dapr-version: '1.18.0'
      test-platform: microsoft-testing-platform
      publish-containers: true
      container-projects: |
        src/Hexalith.Parties/Hexalith.Parties.csproj|parties
        src/Hexalith.Parties.Mcp/Hexalith.Parties.Mcp.csproj|parties-mcp
        src/Hexalith.Parties.UI/Hexalith.Parties.UI.csproj|parties-ui
      test-projects: |
        tests/Hexalith.Parties.Contracts.Tests
        tests/Hexalith.Parties.Authentication.Tests
        tests/Hexalith.Parties.Client.Tests
        tests/Hexalith.Parties.Server.Tests
        tests/Hexalith.Parties.Projections.Tests
        tests/Hexalith.Parties.Security.Tests
        tests/Hexalith.Parties.AdminPortal.Tests
        tests/Hexalith.Parties.ConsumerPortal.Tests
        tests/Hexalith.Parties.UI.Tests
        tests/Hexalith.Parties.Picker.Tests
        tests/Hexalith.Parties.Mcp.Tests
        tests/Hexalith.Parties.Tests
        tests/Hexalith.Parties.Sample.Tests
        tests/Hexalith.Parties.Ci.Tests
    secrets: inherit
