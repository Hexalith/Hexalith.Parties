name: Publish Parties Containers

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Optional immutable SemVer image tag. Leave empty to use MinVer.
        required: false
        type: string
  push:
    branches: [main]
    tags:
      - 'v*'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: false

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  SOLUTION_FILE: Hexalith.Parties.slnx
  ZOT_REGISTRY: registry.hexalith.com
  PUBLISH_MSBUILD_PROPERTIES: -p:UseHexalithProjectReferences=true -p:UseNuGetDeps=false -p:HexalithMemoriesFromSource=false

jobs:
  publish:
    name: Publish Parties images to Zot
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: true

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.301

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('global.json', 'Directory.Packages.props', 'Directory.Build.props', '**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore Parties container projects
        run: |
          set -euo pipefail
          dotnet restore src/Hexalith.Parties.AppHost/Hexalith.Parties.AppHost.csproj $PUBLISH_MSBUILD_PROPERTIES
          dotnet restore src/Hexalith.Parties/Hexalith.Parties.csproj $PUBLISH_MSBUILD_PROPERTIES
          dotnet restore src/Hexalith.Parties.Mcp/Hexalith.Parties.Mcp.csproj $PUBLISH_MSBUILD_PROPERTIES
          dotnet restore src/Hexalith.Parties.UI/Hexalith.Parties.UI.csproj $PUBLISH_MSBUILD_PROPERTIES

      - name: Build Parties container projects
        run: |
          set -euo pipefail
          dotnet build src/Hexalith.Parties/Hexalith.Parties.csproj --configuration Release --no-restore $PUBLISH_MSBUILD_PROPERTIES
          dotnet build src/Hexalith.Parties.Mcp/Hexalith.Parties.Mcp.csproj --configuration Release --no-restore $PUBLISH_MSBUILD_PROPERTIES
          dotnet build src/Hexalith.Parties.UI/Hexalith.Parties.UI.csproj --configuration Release --no-restore $PUBLISH_MSBUILD_PROPERTIES

      - name: Login to Zot
        uses: docker/login-action@v4
        with:
          registry: ${{ env.ZOT_REGISTRY }}
          username: ${{ secrets.ZOT_REGISTRY_USERNAME }}
          password: ${{ secrets.ZOT_REGISTRY_API_KEY }}

      - name: Publish Parties containers
        env:
          REQUESTED_IMAGE_TAG: ${{ github.event.inputs.image_tag || '' }}
          ZOT_REGISTRY_USERNAME: ${{ secrets.ZOT_REGISTRY_USERNAME }}
          ZOT_REGISTRY_API_KEY: ${{ secrets.ZOT_REGISTRY_API_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "$REQUESTED_IMAGE_TAG" ]; then
            pwsh -NoProfile -File scripts/publish-parties-containers.ps1 -Registry "$ZOT_REGISTRY" -ImageTag "$REQUESTED_IMAGE_TAG"
          else
            pwsh -NoProfile -File scripts/publish-parties-containers.ps1 -Registry "$ZOT_REGISTRY"
          fi
