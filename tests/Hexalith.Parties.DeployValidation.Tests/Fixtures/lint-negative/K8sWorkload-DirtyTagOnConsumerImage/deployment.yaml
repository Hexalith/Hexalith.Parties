apiVersion: apps/v1
kind: Deployment
metadata:
  name: dirty-tag
spec:
  template:
    spec:
      imagePullSecrets:
        - name: zot-pull-secret
      containers:
        - name: dirty-tag
          image: registry.hexalith.com/dirty-tag:1.2.3+dirty
          readinessProbe:
            httpGet:
              path: /health
              port: http
          livenessProbe:
            httpGet:
              path: /health
              port: http
