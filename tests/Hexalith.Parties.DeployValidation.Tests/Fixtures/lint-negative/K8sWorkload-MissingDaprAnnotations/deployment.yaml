apiVersion: apps/v1
kind: Deployment
metadata:
  name: parties
spec:
  template:
    metadata:
      annotations:
        example.com/note: no-dapr
    spec:
      imagePullSecrets:
        - name: zot-pull-secret
      containers:
        - name: parties
          image: registry.hexalith.com/parties:1.2.3
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
