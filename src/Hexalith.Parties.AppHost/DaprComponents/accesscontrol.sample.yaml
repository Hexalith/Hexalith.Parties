# DAPR Access Control Configuration for the EventStore sample sidecar.
# Bound only to the sample workload; EventStore may invoke the sample domain
# service and projection endpoints through DAPR service invocation.
apiVersion: dapr.io/v1alpha1
kind: Configuration
metadata:
  name: accesscontrol-sample
spec:
  accessControl:
    defaultAction: deny
    trustDomain: "public"
    policies:
      - appId: eventstore
        defaultAction: deny
        trustDomain: "public"
        namespace: "default"
        operations:
          - name: /process
            httpVerb: ['POST']
            action: allow
          - name: /project
            httpVerb: ['POST']
            action: allow
          - name: /replay-state
            httpVerb: ['POST']
            action: allow
          - name: /admin/operational-index-metadata
            httpVerb: ['POST']
            action: allow
