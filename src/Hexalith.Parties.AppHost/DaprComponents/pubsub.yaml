# DAPR Pub/Sub Component -- Local Development.
# Explicit per-appId publish/subscribe scopes (no empty-string silencing):
# - eventstore publishes parties domain events to sample.parties.events
# - tenants publishes tenant lifecycle events to system.tenants.events
# - parties subscribes to system.tenants.events
# - sample subscribes to sample.parties.events
apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: pubsub
spec:
  type: pubsub.redis
  version: v1
  metadata:
    - name: redisHost
      value: "{env:REDIS_HOST|localhost:6379}"
    - name: redisPassword
      value: "{env:REDIS_PASSWORD|}"
    - name: enableDeadLetter
      value: "true"
    - name: publishingScopes
      value: "eventstore=sample.parties.events;tenants=system.tenants.events"
    - name: subscriptionScopes
      value: "parties=system.tenants.events;sample=sample.parties.events"
scopes:
  - eventstore
  - parties
  - tenants
  - sample
