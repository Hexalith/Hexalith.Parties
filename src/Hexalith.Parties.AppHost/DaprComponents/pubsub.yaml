# DAPR Pub/Sub Component -- Local Development
# ================================================================
# Redis-backed pub/sub for event distribution with per-tenant-per-domain topics.
# Topic pattern: {tenant}.{domain}.events
#
# Scoping:
#   commandapi publishes parties events.
#   sample is authorized as the local reference subscriber used in Story 6.3.
apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: pubsub
spec:
  type: pubsub.redis
  version: v1
  metadata:
    - name: redisHost
      value: "localhost:6379"
scopes:
  - commandapi
  - sample
