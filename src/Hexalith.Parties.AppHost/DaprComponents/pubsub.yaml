# DAPR Pub/Sub Component -- Local Development.
# EventStore publishes domain events; Parties keeps its Tenants subscription path;
# Tenants shares the same Redis-backed component for the local platform topology.
apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: pubsub
spec:
  type: pubsub.redis
  version: v1
  metadata:
    - name: redisHost
      value: "{env:REDIS_HOST|localhost:6379}"
    - name: redisPassword
      value: "{env:REDIS_PASSWORD}"
    - name: enableDeadLetter
      value: "true"
    - name: publishingScopes
      value: "parties=;tenants="
    - name: subscriptionScopes
      value: "parties=system.tenants.events;tenants=;sample=sample.parties.events"
scopes:
  - eventstore
  - parties
  - tenants
  - sample
