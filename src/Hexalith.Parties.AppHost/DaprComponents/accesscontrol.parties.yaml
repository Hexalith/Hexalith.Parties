# DAPR Access Control Configuration for the Parties actor-host sidecar.
# defaultAction: deny - only EventStore may invoke Parties, and only on /process.
# This matches the Story 12.0 `party -> parties/process` mapping; broader paths
# (actor methods, /healthz, /metrics) must not be exposed to peer DAPR callers.
apiVersion: dapr.io/v1alpha1
kind: Configuration
metadata:
  name: accesscontrol-parties
spec:
  accessControl:
    defaultAction: deny
    trustDomain: "public"
    policies:
      - appId: eventstore
        defaultAction: deny
        trustDomain: "public"
        namespace: "default"
        operations:
          - name: /process
            httpVerb: ['POST']
            action: allow
