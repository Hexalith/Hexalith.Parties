# DAPR Access Control Configuration for the Parties actor-host sidecar.
# EventStore is the command/query gateway; it invokes Parties through POST-only
# DAPR service invocation using the Story 12.0 `party -> parties/process` mapping.
apiVersion: dapr.io/v1alpha1
kind: Configuration
metadata:
  name: accesscontrol-parties
spec:
  accessControl:
    defaultAction: allow  # Self-hosted local development; use deny with mTLS in production.
    trustDomain: "public"
    policies:
      - appId: eventstore
        defaultAction: deny
        trustDomain: "public"
        namespace: "default"
        operations:
          - name: /**
            httpVerb: ['POST']
            action: allow
