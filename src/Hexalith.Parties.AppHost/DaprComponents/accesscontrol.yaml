# DAPR Access Control Configuration for the EventStore sidecar.
# defaultAction: deny - only listed peers may invoke EventStore through DAPR.
# Under the EventStore-fronted topology, the caller set is well-known:
# - eventstore-admin: admin operations (HTTP verbs reflect read/write surface)
# - tenants: tenant lifecycle commands routed through EventStore
# - parties: tenant API and reactor commands routed through EventStore
# - sample-blazor-ui: EventStore sample UI commands and queries
apiVersion: dapr.io/v1alpha1
kind: Configuration
metadata:
  name: accesscontrol
spec:
  accessControl:
    defaultAction: deny
    trustDomain: "public"
    policies:
      - appId: eventstore-admin
        defaultAction: deny
        trustDomain: "public"
        namespace: "default"
        operations:
          - name: /**
            httpVerb: ['GET', 'POST', 'PUT']
            action: allow
      - appId: tenants
        defaultAction: deny
        trustDomain: "public"
        namespace: "default"
        operations:
          - name: /**
            httpVerb: ['POST']
            action: allow
      - appId: parties
        defaultAction: deny
        trustDomain: "public"
        namespace: "default"
        operations:
          - name: /**
            httpVerb: ['POST']
            action: allow
      - appId: sample-blazor-ui
        defaultAction: deny
        trustDomain: "public"
        namespace: "default"
        operations:
          - name: /api/v1/commands
            httpVerb: ['POST']
            action: allow
          - name: /api/v1/queries
            httpVerb: ['POST']
            action: allow
