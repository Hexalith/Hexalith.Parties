# DAPR Access Control Configuration for the EventStore Admin Server sidecar.
# defaultAction: deny + empty policies - Admin Server is HTTP-facing and
# delegates to EventStore through HTTP, not DAPR. No peer should invoke it
# through the DAPR sidecar.
apiVersion: dapr.io/v1alpha1
kind: Configuration
metadata:
  name: accesscontrol-eventstore-admin
spec:
  accessControl:
    defaultAction: deny
    trustDomain: "public"
    policies: []
