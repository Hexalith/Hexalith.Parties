# DAPR Access Control Configuration for the EventStore Admin Server sidecar.
# Admin.UI invokes Admin.Server through Dapr service invocation. Local
# self-hosted Dapr does not always expose caller identity without mTLS, so this
# run-mode config remains allow-by-default while documenting the intended caller.
apiVersion: dapr.io/v1alpha1
kind: Configuration
metadata:
  name: accesscontrol-eventstore-admin
spec:
  accessControl:
    defaultAction: allow
    trustDomain: "public"
    policies:
      - appId: eventstore-admin-ui
        defaultAction: deny
        trustDomain: "public"
        namespace: "default"
        operations:
          - name: /**
            httpVerb: ['GET', 'POST', 'PUT', 'DELETE']
            action: allow
