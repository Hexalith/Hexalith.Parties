# DAPR Access Control Configuration for the Tenants sidecar.
# defaultAction: deny - only EventStore (POST commands routed through the
# gateway) and Parties (GET /ready for local health) may invoke Tenants.
apiVersion: dapr.io/v1alpha1
kind: Configuration
metadata:
  name: accesscontrol-tenants
spec:
  accessControl:
    defaultAction: deny
    trustDomain: "public"
    policies:
      - appId: eventstore
        defaultAction: deny
        trustDomain: "public"
        namespace: "default"
        operations:
          - name: /**
            httpVerb: ['POST']
            action: allow
      - appId: parties
        defaultAction: deny
        trustDomain: "public"
        namespace: "default"
        operations:
          - name: /ready
            httpVerb: ['GET']
            action: allow
