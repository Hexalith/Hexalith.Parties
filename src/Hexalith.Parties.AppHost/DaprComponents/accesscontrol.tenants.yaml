# DAPR Access Control Configuration for the Tenants sidecar.
# EventStore invokes Tenants as a domain service through POST-only DAPR service
# invocation; Parties still calls Tenants readiness directly for local health.
apiVersion: dapr.io/v1alpha1
kind: Configuration
metadata:
  name: accesscontrol-tenants
spec:
  accessControl:
    defaultAction: allow  # Self-hosted local development; use deny with mTLS in production.
    trustDomain: "public"
    policies:
      - appId: eventstore
        defaultAction: deny
        trustDomain: "public"
        namespace: "default"
        operations:
          - name: /**
            httpVerb: ['POST']
            action: allow
      - appId: parties
        defaultAction: deny
        trustDomain: "public"
        namespace: "default"
        operations:
          - name: /ready
            httpVerb: ['GET']
            action: allow
