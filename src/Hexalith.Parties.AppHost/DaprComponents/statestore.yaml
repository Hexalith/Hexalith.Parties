# DAPR State Store Component -- Local Development.
# Redis-backed shared state for EventStore, Admin Server, Parties actor hosting,
# and Tenants. keyPrefix=none preserves shared key visibility across sidecars.
apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: statestore
spec:
  type: state.redis
  version: v1
  metadata:
    - name: redisHost
      value: "{env:REDIS_HOST|localhost:6379}"
    - name: redisPassword
      value: "{env:REDIS_PASSWORD|}"
    - name: actorStateStore
      value: "true"
    - name: keyPrefix
      value: "none"
scopes:
  - eventstore
  - eventstore-admin
  - parties
  - tenants
