# DAPR State Store Component -- Local Development
# =============================================================
# Redis-backed state store for actor state, snapshots, and command status tracking.
# Composite key pattern: {tenant}||{domain}||{aggregateId}
#
# Command Status TTL:
#   The 24-hour default TTL for command status entries is set at the APPLICATION level
#   via DaprClient.SaveStateAsync metadata (ttlInSeconds: 86400), NOT at the component level.
#
# Component Scoping:
#   Only commandapi can access this state store. Actors run in-process under the
#   commandapi app-id, so no other app-id needs state store access.
apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: statestore
spec:
  type: state.redis
  version: v1
  metadata:
    - name: redisHost
      value: "localhost:6379"
    - name: actorStateStore
      value: "true"
scopes:
  - commandapi
